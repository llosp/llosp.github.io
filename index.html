<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clicachorro</title>
  <link rel="stylesheet" href="styles.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fuzzy+Bubbles:wght@400;700&display=swap" rel="stylesheet">
  <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico">
</head>

<body>

  <div class="estrelas"></div>

  <audio id="blinkSound" src="eye-blink.mp3"></audio>
  <audio id="honkSound" src="clown-honk.mp3"></audio>

  <!-- botao loja -->
  <button class="btn-loja" id="btnLoja">
    <img src="loja-icon.webp" alt="Loja" draggable="false">
  </button>

  <!-- slide menu da loja -->
  <div class="loja-menu" id="lojaMenu">
    <div class="loja-titulo">Loja</div>
    <div class="loja-saldo" id="lojaSaldo">0 cliques</div>
    <div class="loja-itens">

      <div class="loja-item">
        <div class="item-cor" style="background: #FF6B6B;"></div>
        <div class="item-info">
          <span class="item-nome">Item Vermelho</span>
          <span class="item-preco">50 cliques</span>
        </div>
        <button class="item-btn" data-id="0">Comprar</button>
      </div>

      <div class="loja-item">
        <div class="item-cor" style="background: #6BCB77;"></div>
        <div class="item-info">
          <span class="item-nome">Item Verde</span>
          <span class="item-preco">120 cliques</span>
        </div>
        <button class="item-btn" data-id="1">Comprar</button>
      </div>

      <div class="loja-item">
        <div class="item-cor" style="background: #4D96FF;"></div>
        <div class="item-info">
          <span class="item-nome">Item Azul</span>
          <span class="item-preco">300 cliques</span>
        </div>
        <button class="item-btn" data-id="2">Comprar</button>
      </div>

    </div>
  </div>

  <!-- notificacao de compra -->
  <div class="notificacao" id="notificacao"></div>

  <div class="caixa">
    <div class="cachorro-container">

      <img class="cachorro" src="cachorro.webp" draggable="false">

      <div class="hitbox olho-hitbox"></div>
      <div class="hitbox honk-hitbox"></div>

      <div class="olho">
        <div class="palpebra cima"></div>
        <div class="palpebra baixo"></div>
        <div class="bola"></div>
      </div>

    </div>
    <div class="contador" id="contador">Cliques: 0</div>
  </div>

<script>
const bola = document.querySelector(".bola");
const olho = document.querySelector(".olho");

const blinkSound = document.getElementById("blinkSound");
const honkSound = document.getElementById("honkSound");

const olhoHitbox = document.querySelector(".olho-hitbox");
const honkHitbox = document.querySelector(".honk-hitbox");

const contador = document.getElementById("contador");
const lojaSaldo = document.getElementById("lojaSaldo");
const notificacao = document.getElementById("notificacao");

const containerEstrelas = document.querySelector(".estrelas");

const btnLoja = document.getElementById("btnLoja");
const lojaMenu = document.getElementById("lojaMenu");
let lojaAberta = false;

let cliques = 0;
let moedas = 0;

const itens = [
  { id: 0, nome: "Item Vermelho", preco: 50  },
  { id: 1, nome: "Item Verde",    preco: 120 },
  { id: 2, nome: "Item Azul",     preco: 300 },
];

const comprados = [false, false, false];


function atualizarUI() {
  contador.textContent = "Cliques: " + cliques;
  lojaSaldo.textContent = moedas + " cliques";

  document.querySelectorAll(".item-btn").forEach((btn) => {
    const id = parseInt(btn.dataset.id);
    const item = itens[id];

    if (comprados[id]) {
      btn.textContent = "Comprado";
      btn.disabled = true;
      btn.classList.add("comprado");
    } else if (moedas < item.preco) {
      btn.disabled = true;
      btn.classList.remove("comprado");
    } else {
      btn.disabled = false;
      btn.classList.remove("comprado");
    }
  });
}

function mostrarNotificacao(texto) {
  notificacao.textContent = texto;
  notificacao.classList.add("visivel");
  setTimeout(() => notificacao.classList.remove("visivel"), 2000);
}


// botao loja abre/fecha
btnLoja.addEventListener("click", (event) => {
  event.stopPropagation();
  lojaAberta = !lojaAberta;
  lojaMenu.classList.toggle("aberto", lojaAberta);
});

// botoes de compra
document.querySelectorAll(".item-btn").forEach((btn) => {
  btn.addEventListener("click", (event) => {
    event.stopPropagation();
    const id = parseInt(btn.dataset.id);
    const item = itens[id];

    if (comprados[id] || moedas < item.preco) return;

    moedas -= item.preco;
    comprados[id] = true;
    atualizarUI();
    mostrarNotificacao(item.nome + " comprado!");
  });
});


function explodirEstrelas(x, y, qtd = 50) {
  const cores = ["yellow", "blue", "black"];

  for (let i = 0; i < qtd; i++) {
    const estrela = document.createElement("div");
    estrela.classList.add("estrela");

    estrela.style.left = x + "px";
    estrela.style.top = y + "px";

    const angulo = Math.random() * Math.PI * 2;
    const distancia = Math.random() * 600 + 300;

    const dx = Math.cos(angulo) * distancia;
    const dy = Math.sin(angulo) * distancia;

    estrela.style.setProperty("--x", dx + "px");
    estrela.style.setProperty("--y", dy + "px");

    const size = Math.random() * 12 + 12;
    estrela.style.width = size + "px";
    estrela.style.height = size + "px";

    estrela.style.background = cores[Math.floor(Math.random() * cores.length)];

    containerEstrelas.appendChild(estrela);
    setTimeout(() => estrela.remove(), 800);
  }
}

function addClique() {
  cliques++;
  moedas++;
  atualizarUI();
}


// clique em qualquer lugar
document.addEventListener("click", (event) => {
  addClique();
  explodirEstrelas(event.clientX, event.clientY, 60);
});

// olho pisca
olhoHitbox.addEventListener("click", (event) => {
  event.stopPropagation();
  addClique();
  explodirEstrelas(event.clientX, event.clientY, 60);
  olho.classList.add("fechado");

  blinkSound.currentTime = 0;
  blinkSound.play();

  setTimeout(() => olho.classList.remove("fechado"), 500);
});

// honk
honkHitbox.addEventListener("click", (event) => {
  event.stopPropagation();
  addClique();
  explodirEstrelas(event.clientX, event.clientY, 60);
  honkSound.currentTime = 0;
  honkSound.play();
});


// olho segue o mouse
document.addEventListener("mousemove", (event) => {
  const rect = olho.getBoundingClientRect();

  const olhoX = rect.left + rect.width / 2;
  const olhoY = rect.top + rect.height / 2;

  let dx = event.clientX - olhoX;
  let dy = event.clientY - olhoY;

  const dist = Math.sqrt(dx * dx + dy * dy);
  const max = 20;

  if (dist > max) {
    dx = (dx / dist) * max;
    dy = (dy / dist) * max;
  }

  bola.style.transform = `translate(-50%, -50%) translate(${dx}px, ${dy}px)`;
});
</script>

</body>
</html>
